<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <title>Flashcard Deck</title>
    <link rel="icon" href="data:image/svg+xml,%3Csvg%20xmlns%3D%22http://www.w3.org/2000/svg%22%20viewBox%3D%220%200%20100%20100%22%3E%3Ctext%20y%3D%22.9em%22%20font-size%3D%2290%22%3E%F0%9F%93%87%3C/text%3E%3C/svg%3E">
    <script type="module" src="https://cdn.jsdelivr.net/gh/starfederation/datastar@1.0.0/bundles/datastar.js"></script>
    <style>
            body { margin:0; padding:3rem 1rem; background:#fafaf7;
                   font-family:system-ui, sans-serif; min-height:100vh; }
            button:hover { opacity:0.9; }
            textarea:focus { border-color:#999; }
        </style>
  </head>
  <body>
    <div data-signals="{&quot;current&quot;: 0, &quot;score&quot;: 0, &quot;card0_flipped&quot;: false, &quot;card0_guess&quot;: &quot;&quot;, &quot;card1_flipped&quot;: false, &quot;card1_guess&quot;: &quot;&quot;, &quot;card2_flipped&quot;: false, &quot;card2_guess&quot;: &quot;&quot;, &quot;card3_flipped&quot;: false, &quot;card3_guess&quot;: &quot;&quot;}" style="display:flex; flex-direction:column; align-items:center; gap:1.5rem;">
      <div style="font-size:0.875rem; color:#666;">
        Score: 
        <span data-text="$score" style="font-weight:600;">

        </span>
         / 
        4
      </div>
      <div style="position:relative;">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" data-show="$current == 0" style="width:400px; height:300px; color:#1a1a1a; filter:drop-shadow(0 8px 24px rgba(0,0,0,0.1));">
          <defs>
            <linearGradient id="paper0" x1="0" y1="0" x2="0" y2="1">
              <stop offset="0%" stop-color="#fdfdfb" />
              <stop offset="100%" stop-color="#f5f3ee" />
            </linearGradient>
          </defs>
          <rect x="0" y="0" width="400" height="300" rx="12" fill="url(#paper0)" stroke="#e5e2da" stroke-width="1" />
          <g transform="translate(16,16) rotate(0)">
            <path d="M 0 20 L 0 0 L 20 0" stroke="currentColor" fill="none" stroke-width="2" stroke-linecap="round" />
            <circle cx="0" cy="0" r="3" fill="currentColor" />
          </g>
          <g transform="translate(384,16) rotate(90)">
            <path d="M 0 20 L 0 0 L 20 0" stroke="currentColor" fill="none" stroke-width="2" stroke-linecap="round" />
            <circle cx="0" cy="0" r="3" fill="currentColor" />
          </g>
          <g transform="translate(384,284) rotate(180)">
            <path d="M 0 20 L 0 0 L 20 0" stroke="currentColor" fill="none" stroke-width="2" stroke-linecap="round" />
            <circle cx="0" cy="0" r="3" fill="currentColor" />
          </g>
          <g transform="translate(16,284) rotate(270)">
            <path d="M 0 20 L 0 0 L 20 0" stroke="currentColor" fill="none" stroke-width="2" stroke-linecap="round" />
            <circle cx="0" cy="0" r="3" fill="currentColor" />
          </g>
          <foreignObject x="0" y="0" width="400" height="300">
            <div style="height:100%; box-sizing:border-box; display:flex; flex-direction:column; padding:1.5rem; font-family:system-ui, sans-serif;">
              <div data-show="!$card0_flipped" style="flex:1; display:flex; flex-direction:column; gap:1rem;">
                <div style="font-size:0.75rem; color:#888; letter-spacing:0.1em;">QUESTION 1 / 4</div>
                <div style="font-size:1.25rem; font-weight:500; line-height:1.4;">What is a closure?</div>
                <textarea data-bind="card0_guess" placeholder="Type your answer, then flip…" style="flex:1; border:1px solid #ddd; border-radius:6px; padding:0.75rem; font:inherit; resize:none; outline:none;">

                </textarea>
                <button data-on:click="$card0_flipped = true" style="padding:0.6rem; border:none; border-radius:6px; background:#1a1a1a; color:white; font:inherit; cursor:pointer;">Reveal answer ↓</button>
              </div>
              <div data-show="$card0_flipped" style="flex:1; display:flex; flex-direction:column; gap:0.75rem;">
                <div style="font-size:0.75rem; color:#888; letter-spacing:0.1em;">YOUR ANSWER</div>
                <div data-text="$card0_guess || &#x27;(no answer)&#x27;" style="padding:0.5rem 0.75rem; background:#f4f4f4; border-radius:6px; min-height:2rem; color:#555;">

                </div>
                <div style="font-size:0.75rem; color:#888; letter-spacing:0.1em;">CORRECT ANSWER</div>
                <div style="padding:0.5rem 0.75rem; background:#eef7ee; border-radius:6px; line-height:1.4;">A function plus the variables it captured from its defining scope.</div>
                <div style="display:flex; gap:0.5rem; margin-top:auto;">
                  <button data-on:click="$card0_flipped = false; $card0_guess = &#x27;&#x27;; $current = ($current + 1) % 4" style="flex:1; padding:0.6rem; border:1px solid #c33; background:white; color:#c33; border-radius:6px; font:inherit; cursor:pointer;">Missed it ✗</button>
                  <button data-on:click="$card0_flipped = false; $card0_guess = &#x27;&#x27;; $current = ($current + 1) % 4; $score++" style="flex:1; padding:0.6rem; border:none; background:#2a7; color:white; border-radius:6px; font:inherit; cursor:pointer;">Got it ✓</button>
                </div>
              </div>
            </div>
          </foreignObject>
        </svg>
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" data-show="$current == 1" style="width:400px; height:300px; color:#1a1a1a; filter:drop-shadow(0 8px 24px rgba(0,0,0,0.1));">
          <defs>
            <linearGradient id="paper1" x1="0" y1="0" x2="0" y2="1">
              <stop offset="0%" stop-color="#fdfdfb" />
              <stop offset="100%" stop-color="#f5f3ee" />
            </linearGradient>
          </defs>
          <rect x="0" y="0" width="400" height="300" rx="12" fill="url(#paper1)" stroke="#e5e2da" stroke-width="1" />
          <g transform="translate(16,16) rotate(0)">

            <circle cx="0" cy="0" r="3" fill="currentColor" />
          </g>
          <g transform="translate(384,284) rotate(180)">
            <path d="M 0 20 L 0 0 L 20 0" stroke="currentColor" fill="none" stroke-width="2" stroke-linecap="round" />
            <circle cx="0" cy="0" r="3" fill="currentColor" />
          </g>
          <g transform="translate(16,284) rotate(270)">
            <path d="M 0 20 L 0 0 L 20 0" stroke="currentColor" fill="none" stroke-width="2" stroke-linecap="round" />
            <circle cx="0" cy="0" r="3" fill="currentColor" />
          </g>
          <foreignObject x="0" y="0" width="400" height="300">
            <div style="height:100%; box-sizing:border-box; display:flex; flex-direction:column; padding:1.5rem; font-family:system-ui, sans-serif;">
              <div data-show="!$card1_flipped" style="flex:1; display:flex; flex-direction:column; gap:1rem;">
                <div style="font-size:0.75rem; color:#888; letter-spacing:0.1em;">QUESTION 2 / 4</div>
                <div style="font-size:1.25rem; font-weight:500; line-height:1.4;">What does `data-on:click` do in Datastar?</div>
                <textarea data-bind="card1_guess" placeholder="Type your answer, then flip…" style="flex:1; border:1px solid #ddd; border-radius:6px; padding:0.75rem; font:inherit; resize:none; outline:none;">

                </textarea>
                <button data-on:click="$card1_flipped = true" style="padding:0.6rem; border:none; border-radius:6px; background:#1a1a1a; color:white; font:inherit; cursor:pointer;">Reveal answer ↓</button>
              </div>
              <div data-show="$card1_flipped" style="flex:1; display:flex; flex-direction:column; gap:0.75rem;">
                <div style="font-size:0.75rem; color:#888; letter-spacing:0.1em;">YOUR ANSWER</div>
                <div data-text="$card1_guess || &#x27;(no answer)&#x27;" style="padding:0.5rem 0.75rem; background:#f4f4f4; border-radius:6px; min-height:2rem; color:#555;">

                </div>
                <div style="font-size:0.75rem; color:#888; letter-spacing:0.1em;">CORRECT ANSWER</div>
                <div style="padding:0.5rem 0.75rem; background:#eef7ee; border-radius:6px; line-height:1.4;">Attaches a click event handler that evaluates a Datastar expression.</div>
                <div style="display:flex; gap:0.5rem; margin-top:auto;">
                  <button data-on:click="$card1_flipped = false; $card1_guess = &#x27;&#x27;; $current = ($current + 1) % 4" style="flex:1; padding:0.6rem; border:1px solid #c33; background:white; color:#c33; border-radius:6px; font:inherit; cursor:pointer;">Missed it ✗</button>
                  <button data-on:click="$card1_flipped = false; $card1_guess = &#x27;&#x27;; $current = ($current + 1) % 4; $score++" style="flex:1; padding:0.6rem; border:none; background:#2a7; color:white; border-radius:6px; font:inherit; cursor:pointer;">Got it ✓</button>
                </div>
              </div>
            </div>
          </foreignObject>
        </svg>
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" data-show="$current == 2" style="width:400px; height:300px; color:#1a1a1a; filter:drop-shadow(0 8px 24px rgba(0,0,0,0.1));">
          <defs>
            <linearGradient id="paper2" x1="0" y1="0" x2="0" y2="1">
              <stop offset="0%" stop-color="#fdfdfb" />
              <stop offset="100%" stop-color="#f5f3ee" />
            </linearGradient>
          </defs>
          <rect x="0" y="0" width="400" height="300" rx="12" fill="url(#paper2)" stroke="#e5e2da" stroke-width="1" />
          <g transform="translate(16,16) rotate(0)">
            <path d="M 0 20 L 0 0 L 20 0" stroke="currentColor" fill="none" stroke-width="2" stroke-linecap="round" />
            <circle cx="0" cy="0" r="3" fill="currentColor" />
          </g>
          <g transform="translate(384,16) rotate(90)">
            <path d="M 0 20 L 0 0 L 20 0" stroke="currentColor" fill="none" stroke-width="2" stroke-linecap="round" />
            <circle cx="0" cy="0" r="3" fill="currentColor" />
          </g>
          <g transform="translate(384,284) rotate(180)">
            <path d="M 0 20 L 0 0 L 20 0" stroke="currentColor" fill="none" stroke-width="2" stroke-linecap="round" />
            <circle cx="0" cy="0" r="3" fill="currentColor" />
          </g>
          <g transform="translate(16,284) rotate(270)">
            <path d="M 0 20 L 0 0 L 20 0" stroke="currentColor" fill="none" stroke-width="2" stroke-linecap="round" />
            <circle cx="0" cy="0" r="3" fill="currentColor" />
          </g>
          <foreignObject x="0" y="0" width="400" height="300">
            <div style="height:100%; box-sizing:border-box; display:flex; flex-direction:column; padding:1.5rem; font-family:system-ui, sans-serif;">
              <div data-show="!$card2_flipped" style="flex:1; display:flex; flex-direction:column; gap:1rem;">
                <div style="font-size:0.75rem; color:#888; letter-spacing:0.1em;">QUESTION 3 / 4</div>
                <div style="font-size:1.25rem; font-weight:500; line-height:1.4;">Why does &lt;circle/&gt; self-close in SVG but &lt;input&gt; doesn&#x27;t in HTML?</div>
                <textarea data-bind="card2_guess" placeholder="Type your answer, then flip…" style="flex:1; border:1px solid #ddd; border-radius:6px; padding:0.75rem; font:inherit; resize:none; outline:none;">

                </textarea>
                <button data-on:click="$card2_flipped = true" style="padding:0.6rem; border:none; border-radius:6px; background:#1a1a1a; color:white; font:inherit; cursor:pointer;">Reveal answer ↓</button>
              </div>
              <div data-show="$card2_flipped" style="flex:1; display:flex; flex-direction:column; gap:0.75rem;">
                <div style="font-size:0.75rem; color:#888; letter-spacing:0.1em;">YOUR ANSWER</div>
                <div data-text="$card2_guess || &#x27;(no answer)&#x27;" style="padding:0.5rem 0.75rem; background:#f4f4f4; border-radius:6px; min-height:2rem; color:#555;">

                </div>
                <div style="font-size:0.75rem; color:#888; letter-spacing:0.1em;">CORRECT ANSWER</div>
                <div style="padding:0.5rem 0.75rem; background:#eef7ee; border-radius:6px; line-height:1.4;">SVG uses XML rules (self-closing void elements); HTML uses its own void-element list without self-closing.</div>
                <div style="display:flex; gap:0.5rem; margin-top:auto;">
                  <button data-on:click="$card2_flipped = false; $card2_guess = &#x27;&#x27;; $current = ($current + 1) % 4" style="flex:1; padding:0.6rem; border:1px solid #c33; background:white; color:#c33; border-radius:6px; font:inherit; cursor:pointer;">Missed it ✗</button>
                  <button data-on:click="$card2_flipped = false; $card2_guess = &#x27;&#x27;; $current = ($current + 1) % 4; $score++" style="flex:1; padding:0.6rem; border:none; background:#2a7; color:white; border-radius:6px; font:inherit; cursor:pointer;">Got it ✓</button>
                </div>
              </div>
            </div>
          </foreignObject>
        </svg>
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" data-show="$current == 3" style="width:400px; height:300px; color:#1a1a1a; filter:drop-shadow(0 8px 24px rgba(0,0,0,0.1));">
          <defs>
            <linearGradient id="paper3" x1="0" y1="0" x2="0" y2="1">
              <stop offset="0%" stop-color="#fdfdfb" />
              <stop offset="100%" stop-color="#f5f3ee" />
            </linearGradient>
          </defs>
          <rect x="0" y="0" width="400" height="300" rx="12" fill="url(#paper3)" stroke="#e5e2da" stroke-width="1" />
          <g transform="translate(16,16) rotate(0)">
            <path d="M 0 20 L 0 0 L 20 0" stroke="currentColor" fill="none" stroke-width="2" stroke-linecap="round" />

          <foreignObject x="0" y="0" width="400" height="300">
            <div style="height:100%; box-sizing:border-box; display:flex; flex-direction:column; padding:1.5rem; font-family:system-ui, sans-serif;">
              <div data-show="!$card3_flipped" style="flex:1; display:flex; flex-direction:column; gap:1rem;">
                <div style="font-size:0.75rem; color:#888; letter-spacing:0.1em;">QUESTION 4 / 4</div>
                <div style="font-size:1.25rem; font-weight:500; line-height:1.4;">What is referential transparency?</div>
                <textarea data-bind="card3_guess" placeholder="Type your answer, then flip…" style="flex:1; border:1px solid #ddd; border-radius:6px; padding:0.75rem; font:inherit; resize:none; outline:none;">

                </textarea>
                <button data-on:click="$card3_flipped = true" style="padding:0.6rem; border:none; border-radius:6px; background:#1a1a1a; color:white; font:inherit; cursor:pointer;">Reveal answer ↓</button>
              </div>
              <div data-show="$card3_flipped" style="flex:1; display:flex; flex-direction:column; gap:0.75rem;">
                <div style="font-size:0.75rem; color:#888; letter-spacing:0.1em;">YOUR ANSWER</div>
                <div data-text="$card3_guess || &#x27;(no answer)&#x27;" style="padding:0.5rem 0.75rem; background:#f4f4f4; border-radius:6px; min-height:2rem; color:#555;">

                </div>
                <div style="font-size:0.75rem; color:#888; letter-spacing:0.1em;">CORRECT ANSWER</div>
                <div style="padding:0.5rem 0.75rem; background:#eef7ee; border-radius:6px; line-height:1.4;">A function is referentially transparent if replacing it with its return value never changes program behavior.</div>
                <div style="display:flex; gap:0.5rem; margin-top:auto;">
                  <button data-on:click="$card3_flipped = false; $card3_guess = &#x27;&#x27;; $current = ($current + 1) % 4" style="flex:1; padding:0.6rem; border:1px solid #c33; background:white; color:#c33; border-radius:6px; font:inherit; cursor:pointer;">Missed it ✗</button>
                  <button data-on:click="$card3_flipped = false; $card3_guess = &#x27;&#x27;; $current = ($current + 1) % 4; $score++" style="flex:1; padding:0.6rem; border:none; background:#2a7; color:white; border-radius:6px; font:inherit; cursor:pointer;">Got it ✓</button>
                </div>

        </svg>
      </div>
    </div>
  </body>
</html>
