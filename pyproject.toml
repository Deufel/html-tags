[project]
name = "html-tags"
version = "0.0.7"
description = "concise html tag generation"
readme = "README.md"
authors = [
    { name = "Deufel", email = "MDeufel13@gmail.com" }
]
requires-python = ">=3.12"
dependencies = [
    "marimo>=0.21.1",
    "marimo-dev>=0.3.2",
]

[project.urls]
Repository = "https://github.com/Deufel/html-tags"


[dependency-groups]
dev = [
    "marimo>=0.21.0",
    "marimo-dev>=0.3.1",
]


[build-system]
requires = ["uv_build>=0.9.18,<0.10.0"]
build-backend = "uv_build"
